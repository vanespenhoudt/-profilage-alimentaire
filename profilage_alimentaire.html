<body>
<div class="wrap"><div id="app"></div></div>

<script>
/* ── CONFIG ── */
const isAdmin=location.search.includes('admin')||location.hash.includes('admin');
const C6=["#2a7d4f","#5e9e3a","#9ab830","#e09000","#d06020","#c03030"];
const BTS=["A+","A-","B+","B-","AB+","AB-","O+","O-"];

/* ── STATE ── */
let S={prenom:"",nom:"",tel:"",email:"",adresse:"",bt:"",answers:{},saves:[],op:false,os:{bt:false,m:true,a:false,j:false,d:false,h:false,menu:true},si:"",cid:null,menuMode:"text",menuText:"",menuFile:"",menuFileName:"",rgpd:false};
let CFG={fbUrl:"",openCfg:false,openTh:false};
let TH={name:"",email:"",code:"",rgpdText:""};
function loadTH(){try{const d=localStorage.getItem("pf4_cons");if(d)Object.assign(TH,JSON.parse(d));}catch(e){}}
function saveTH(){try{localStorage.setItem("pf4_cons",JSON.stringify(TH));}catch(e){}}
let syncTimer=null, syncing=false;

/* ── FIREBASE DB ── */
function fbBase(){return CFG.fbUrl?CFG.fbUrl.replace(/\/+$/,""):null;}
async function sbH(){return{"apikey":CFG.sbKey,"Authorization":"Bearer "+CFG.sbKey,"Content-Type":"application/json","Prefer":"return=representation"};}
function sbUrl(path,filter){return CFG.sbUrl+"/rest/v1/profilage_clients"+(filter?"?"+filter:"");}
function hasSb(){return!!(CFG.sbUrl&&CFG.sbKey&&TH.code);}

async function dbSave(id,data){
  if(!hasSb()){try{localStorage.setItem("pf5_"+id,JSON.stringify(data));}catch(e){}return;}
  const row={id,conseiller_code:TH.code,...data,updated_at:new Date().toISOString()};
  await fetch(sbUrl(),{method:"POST",headers:{...sbH(),"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(row)}).catch(()=>{});
}
async function dbLoad(id){
  if(!hasSb()){try{const v=localStorage.getItem("pf5_"+id);return v?JSON.parse(v):null;}catch(e){return null;}}
  try{
    const r=await fetch(sbUrl("","id=eq."+encodeURIComponent(id)+"&conseiller_code=eq."+encodeURIComponent(TH.code)+"&limit=1"),{headers:sbH()});
    const rows=await r.json();return rows&&rows[0]?rows[0]:null;
  }catch(e){return null;}
}
async function dbDelete(id){
  if(!hasSb()){try{localStorage.removeItem("pf5_"+id);}catch(e){}return;}
  await fetch(sbUrl("","id=eq."+encodeURIComponent(id)+"&conseiller_code=eq."+encodeURIComponent(TH.code)),{method:"DELETE",headers:sbH()}).catch(()=>{});
}
async function dbLoadAll(){
  if(!hasSb())return [];
  try{
    const r=await fetch(sbUrl("","conseiller_code=eq."+encodeURIComponent(TH.code)+"&is_current=eq.false&order=updated_at.desc"),{headers:sbH()});
    return await r.json()||[];
  }catch(e){return [];}
}
async function testSb(url,key){
  try{
    const r=await fetch(url+"/rest/v1/profilage_clients?limit=1",{headers:{"apikey":key,"Authorization":"Bearer "+key}});
    return r.ok||r.status===406;
  }catch(e){return false;}
}
function schedSave(){
  clearTimeout(syncTimer);
  syncing=true;
  document.getElementById("sdot")&&(document.getElementById("sdot").style.display="inline-block");
  syncTimer=setTimeout(async()=>{

function togP(){S.op=!S.op;R();}
async function savePro(){
  const nm=(S.si||(S.prenom+" "+S.nom).trim()||"Profil").trim();
  const id="p"+Date.now();
  const meta={id,name:nm,bt:S.bt,date:new Date().toLocaleDateString("fr-BE"),pct:calcPct()};
  await dbSave(id,{is_current:false,answers:{...S.answers},prenom:S.prenom,nom:S.nom,nom:S.nom,tel:S.tel,email:S.email,adresse:S.adresse,bt:S.bt,menuMode:S.menuMode,menuText:S.menuText,menuFile:S.menuFile||"",menuFileName:S.menuFileName,rgpd:S.rgpd,save_name:nm,completion_pct:calcPct()});
  S.saves=[meta,...S.saves.slice(0,19)];S.cid=id;S.si="";
  schedSave();R();
}
async function loadPro(id){
  const d=await dbLoad(id);
  if(!d)return;
  S.prenom=d.prenom||d.name||"";S.nom=d.nom||"";S.tel=d.tel||"";S.adresse=d.adresse||"";
  S.email=d.email||"";S.bt=d.bt||"";
  if(d.menuMode)S.menuMode=d.menuMode;
  if(d.menuText!==undefined)S.menuText=d.menuText;
  if(d.menuFileName)S.menuFileName=d.menuFileName;
  S.answers={...d.answers};S.cid=id;
  schedSave();R();
}
async function delPro(id){
  if(!confirm("Supprimer ce profil ?"))return;
  await dbDelete(id);
  S.saves=S.saves.filter(x=>x.id!==id);if(S.cid===id)S.cid=null;
  schedSave();R();
}
function calcPct(){
  const tot=MB.length+MS.length+VQ.length+PQ.length+KQ.length+JR.reduce((s,c)=>s+c.q.length,0)+(DC1.length+DC2.length)+HC.reduce((s,c)=>s+c.q.length,0);
  return Math.round(Object.keys(S.answers).length/tot*100);
}

/* ── SCORES ── */
function sMet(){let a=0,b=0;MB.forEach(q=>{if(S.answers[q.id]==="a")a++;if(S.answers[q.id]==="b")b++;});return{a,b,type:Math.abs(a-b)>=5?(a>b?"Cueilleur A":"Chasseur B"):"Mixte"};}
function sAyu(){let v=0,p=0,k=0;VQ.forEach((_,i)=>{v+=+S.answers["v"+i]||0;});PQ.forEach((_,i)=>{p+=+S.answers["p"+i]||0;});KQ.forEach((_,i)=>{k+=+S.answers["k"+i]||0;});return{v,p,k};}
function sJR(){return JR.map(c=>{let t=0;c.q.forEach((q,i)=>{if(S.answers[c.id+"_"+i])t+=q.w;});return{t,ov:t>c.h};});}
function sDia(){let c1g=0,c1r=0,c2g=0,c2r=0;DC1.forEach(q=>{if(S.answers[q.id]==="g")c1g++;if(S.answers[q.id]==="r")c1r++;});DC2.forEach(q=>{if(S.answers[q.id]==="g")c2g++;if(S.answers[q.id]==="r")c2r++;});return{c1g,c1r,c2g,c2r};}
function sHor(){return HC.map(c=>{let t=0;c.q.forEach((_,i)=>{if(S.answers[c.id+"_"+i])t++;});return{t};});}

    JR.forEach((cls,ci)=>{

      cls.q.forEach((q,i)=>{const on=!!S.answers[cls.id+"_"+i];h+=`<div class="ck" onclick="set('${cls.id+"_"+i}',true)"><div class="ckb${on?" on":""}">${on?"✓":""}</div><span class="ckt">${q.t} <small style="color:#bbb">(${q.w}pts)</small></span></div>`;});

    h+=`<div class="sbanner">${jr.map((s,i)=>`<span class="${s.ov?"spw":"spn"}">${i+1}:${s.t}/${JR[i].h}</span>`).join("")}</div></div>`;

  /* SEC 4 DIATHÈSE */
  h+=`<div class="sec"><div class="sh" style="border-left-color:#8a5baa" onclick="tog('d')">
    <div class="sinfo"><div class="sname2">⚗ Diathèse de Ménétrier</div><div class="shint">D1 (vert) · D2 (rouge) — Enfance et aujourd'hui</div></div>
    <span class="ssc${diaA>0?" g":""}">D1:${dia.c1g+dia.c2g} · D2:${dia.c1r+dia.c2r}</span>

  if(S.os.d){
    h+=`<div class="sbody">
      <div style="display:flex;gap:8px;margin-bottom:8px"><span style="font-size:12px;padding:4px 12px;background:#eef7f1;border-radius:8px;color:#1b5934;font-weight:700;border:1px solid #2a7d4f">D1 — côté gauche</span><span style="font-size:12px;padding:4px 12px;background:#fdf0f0;border-radius:8px;color:#8a1a1a;font-weight:700;border:1px solid #c03030">D2 — côté droit</span></div>
      <p class="sub">Colonne 1 – Enfance (avant 12 ans)</p>`;
    DC1.forEach(q=>{h+=`<div class="drow"><div class="dtog"><button class="dg${S.answers[q.id]==="g"?" on":""}" onclick="set('${q.id}','g')">${q.g}</button><button class="dr2${S.answers[q.id]==="r"?" on":""}" onclick="set('${q.id}','r')">${q.r}</button></div></div>`;});
    h+=`<p class="sub">Colonne 2 – Aujourd'hui</p>`;
    DC2.forEach(q=>{h+=`<div class="drow"><div class="dtog"><button class="dg${S.answers[q.id]==="g"?" on":""}" onclick="set('${q.id}','g')">${q.g}</button><button class="dr2${S.answers[q.id]==="r"?" on":""}" onclick="set('${q.id}','r')">${q.r}</button></div></div>`;});
    h+=`<div class="sbanner"><span class="spg">Col.1 D1:${dia.c1g}</span><span class="spr">Col.1 D2:${dia.c1r}</span><span class="spg">Col.2 D1:${dia.c2g}</span><span class="spr">Col.2 D2:${dia.c2r}</span></div></div>`;

  /* SEC 5 HORMONES */
  h+=`<div class="sec"><div class="sh" style="border-left-color:#c48a00" onclick="tog('h')">
    <div class="sinfo"><div class="sname2">🧪 Bilan hormonal</div><div class="shint">8 catégories — cochez vos symptômes</div></div>
    <span class="ssc${horA>0?" g":""}">${horA}/${horT} cochés</span>
    <span class="chv${S.os.h?" o":""}">▾</span>
  </div>`;
  if(S.os.h){
    h+=`<div class="sbody">`;
    HC.forEach((cat,ci)=>{
      const sc=hor[ci];
      h+=`<div class="cbar"><span class="cbn">${cat.t}</span><span class="cbs">${sc.t}/${cat.m}</span></div>`;
      cat.q.forEach((q,i)=>{const on=!!S.answers[cat.id+"_"+i];h+=`<div class="ck" onclick="set('${cat.id+"_"+i}',true)"><div class="ckb${on?" on":""}">${on?"✓":""}</div><span class="ckt">${q}</span></div>`;});

  if(S.os.menu){

function handleFileSelect(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.menuFile=e.target.result;S.menuFileName=file.name;schedSave();R();};
  if(file.name.match(/\.txt$/i)){reader.readAsText(file);}
  else{reader.readAsDataURL(file);}
}
function handleFileDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  const file=e.dataTransfer.files[0];if(!file)return;
  const inp=document.createElement('input');inp.files=e.dataTransfer.files;
  handleFileSelect({files:e.dataTransfer.files});
}
// ── ADMIN FUNCTIONS ──
let adminClients=[];
let modalClientId=null;

async function loadAdminClients(){
  adminClients=await dbLoadAll();
  R();
}

function fmtClientBody(d){
  const answers=d.answers||{};
  let a=d.answers||{};
  let met_a=0,met_b=0;
  MB.forEach(q=>{if(a[q.id]==="a")met_a++;if(a[q.id]==="b")met_b++;});
  const met_type=Math.abs(met_a-met_b)>=5?(met_a>met_b?"Cueilleur A":"Chasseur B"):"Mixte";
  let v=0,p=0,k=0;
  VQ.forEach((_,i)=>{v+=+a["v"+i]||0;});
  PQ.forEach((_,i)=>{p+=+a["p"+i]||0;});
  KQ.forEach((_,i)=>{k+=+a["k"+i]||0;});
  const jr=JR.map(c=>{let t=0;c.q.forEach((q,i)=>{if(a[c.id+"_"+i])t+=q.w;});return{t,ov:t>c.h};});
  let c1g=0,c1r=0,c2g=0,c2r=0;
  DC1.forEach(q=>{if(a[q.id]==="g")c1g++;if(a[q.id]==="r")c1r++;});
  DC2.forEach(q=>{if(a[q.id]==="g")c2g++;if(a[q.id]==="r")c2r++;});
  const hor=HC.map(c=>{let t=0;c.q.forEach((_,i)=>{if(a[c.id+"_"+i])t++;});return t;});
  let body="SUIVI PROFILAGE ALIMENTAIRE\n";
  body+="=".repeat(40)+"\n";
  body+=`Prénom    : ${d.prenom||"—"} ${d.nom||""}\n`;
  body+=`Téléphone : ${d.tel||"—"}\n`;
  body+=`Email     : ${d.email||"—"}\n`;
  body+=`Adresse   : ${d.adresse||"—"}\n`;
  body+=`Groupe    : ${d.bt||"—"}\n`;
  body+=`Date      : ${d.date||new Date().toLocaleDateString("fr-BE")}\n`;
  body+="\n1. TYPAGE MÉTABOLIQUE\n";
  body+=`   Cueilleur A : ${met_a} pts | Chasseur B : ${met_b} pts\n`;
  body+=`   Profil : ${met_type}\n`;
  body+="\n2. AYURVEDA\n";
  body+=`   Vâta : ${v}/114 | Pitta : ${p}/120 | Kapha : ${k}/120\n`;
  body+="\n3. JULIA ROSS\n";
  JR.forEach((c,i)=>{body+=`   ${c.t} : ${jr[i].t} pts / seuil ${c.h}${jr[i].ov?" ⚠":""}\n`;});
  body+="\n4. DIATHÈSE DE MÉNÉTRIER\n";
  body+=`   Col.1 D1:${c1g} D2:${c1r} | Col.2 D1:${c2g} D2:${c2r}\n`;
  body+="\n5. BILAN HORMONAL\n";
  HC.forEach((c,i)=>{body+=`   ${c.t} : ${hor[i]}/${c.m}\n`;});
  if(d.menuText){body+="\n6. MENUS 5 JOURS\n"+d.menuText+"\n";}
  return body;
}

function downloadClient(id){
  const d=adminClients.find(x=>x.id===id);if(!d)return;
  const body=fmtClientBody(d);
  const name=(d.prenom||"client")+"_"+(d.nom||"")+"_"+d.date.replace(/\//g,"-");
  const blob=new Blob([body],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=name+".txt";a.click();
}

function downloadAllCSV(){
  let csv="ID,Prénom,Nom,Téléphone,Email,Adresse,Groupe sanguin,Date,Complétion%,Cueilleur A,Chasseur B,Profil métabo,Vâta,Pitta,Kapha\n";
  adminClients.forEach(d=>{
    const a=d.answers||{};
    let ma=0,mb=0;MB.forEach(q=>{if(a[q.id]==="a")ma++;if(a[q.id]==="b")mb++;});
    let v=0,p=0,k=0;
    VQ.forEach((_,i)=>{v+=+a["v"+i]||0;});
    PQ.forEach((_,i)=>{p+=+a["p"+i]||0;});
    KQ.forEach((_,i)=>{k+=+a["k"+i]||0;});
    const mt=Math.abs(ma-mb)>=5?(ma>mb?"Cueilleur A":"Chasseur B"):"Mixte";
    csv+=`"${d.id}","${d.prenom||""}","${d.nom||""}","${d.tel||""}","${d.email||""}","${d.adresse||""}","${d.bt||""}","${d.date||""}","${d.pct||0}%","${ma}","${mb}","${mt}","${v}","${p}","${k}"\n`;
  });
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="clients_"+new Date().toLocaleDateString("fr-BE").replace(/\//g,"-")+".csv";
  a.click();
}

function openModal(id){
  modalClientId=id;R();
  setTimeout(()=>document.getElementById("modal-bg")?.scrollIntoView({block:"start"}),50);
}
function closeModal(){modalClientId=null;R();}

async function deleteClient(id){
  if(!confirm("Supprimer définitivement ce client ?"))return;
  await delPro(id);
  adminClients=adminClients.filter(x=>x.id!==id);
  R();
}

function newClient(){
  S.prenom="";S.nom="";S.tel="";S.email="";S.adresse="";S.bt="";
  S.answers={};S.rgpd=false;S.menuText="";S.menuFile="";S.menuFileName="";S.cid=null;
  schedSave();
  window.location.href=window.location.href.replace("?admin","");
}
