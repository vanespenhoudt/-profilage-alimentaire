name: Deploy to one.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ssh.c9nzzvn7q.service.one
          username: c9nzzvn7q_ssh
          key: ${{ secrets.ONE_COM_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /customers/b/8/f/c9nzzvn7q/webroots/a44183bb/laravel_app

            echo "▶ git pull"
            git pull origin main

            echo "▶ composer install"
            php /usr/local/bin/composer install --no-dev --optimize-autoloader --quiet

            echo "▶ migrations"
            php artisan migrate --force

            echo "▶ chiffrement données existantes"
            php artisan clients:encrypt-existing

            echo "▶ cache"
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "✓ Deploy terminé $(date)"
